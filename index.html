<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="用纯 HTML、CSS 和 JavaScript 制作的亚克力唱片墙展示效果。"
    />
    <title>Record Wall · 亚克力专辑墙</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="room-architecture" aria-hidden="true"></div>

    <div class="layout-controls" role="group" aria-label="专辑排列方式">
      <button class="layout-option" type="button" data-layout="4x2" aria-pressed="true" hidden>4×2</button>
      <button class="layout-option" type="button" data-layout="3x3" aria-pressed="false" hidden>3×3</button>
      <button class="layout-option" type="button" data-layout="3x2" aria-pressed="false" hidden>3×2</button>
      <button
        class="cover-import"
        id="openPlaylistImport"
        type="button"
        title="从网易云或 QQ 音乐歌单导入专辑封面"
        aria-haspopup="dialog"
      >
        <span>导入歌单</span>
      </button>
      <button
        class="share-control"
        id="copyShareLink"
        type="button"
        title="复制可复原当前墙面的分享链接"
        hidden
      >
        <span>复制分享</span>
      </button>
      <button
        class="share-control"
        id="openShareImage"
        type="button"
        title="生成可保存的唱片墙图片"
        aria-haspopup="dialog"
        hidden
      >
        <span>分享图片</span>
      </button>
    </div>

    <main class="wall">
      <div class="gallery-stage" id="galleryStage">
        <section class="record-grid" id="recordGrid" aria-label="唱片收藏"></section>
      </div>
    </main>

    <dialog class="playlist-dialog" id="playlistDialog" aria-labelledby="playlistDialogTitle">
      <div class="playlist-dialog__surface">
        <button class="dialog-close" id="closePlaylistDialog" type="button" aria-label="关闭导入弹窗">
          <span aria-hidden="true"></span>
        </button>

        <div class="dialog-heading">
          <span class="dialog-kicker" id="playlistDialogKicker">NETEASE PLAYLIST</span>
          <h2 id="playlistDialogTitle">把歌单放上墙</h2>
          <p>
            当前 <strong id="currentLayoutLabel">4×2</strong> 布局将随机抽取
            <strong id="requiredCoverCount">8</strong> 首歌曲的专辑封面。
          </p>
        </div>

        <form id="playlistImportForm">
          <fieldset class="platform-switch">
            <legend>音乐平台</legend>
            <label>
              <input type="radio" name="playlistPlatform" value="netease" checked />
              <span>网易云音乐</span>
            </label>
            <label>
              <input type="radio" name="playlistPlatform" value="qq" />
              <span>QQ 音乐</span>
            </label>
          </fieldset>

          <label class="playlist-field" for="playlistUrl">
            <span>歌单链接</span>
            <span class="playlist-input-wrap">
              <span class="playlist-input-prefix" aria-hidden="true">URL</span>
              <input
                id="playlistUrl"
                name="playlistUrl"
                type="text"
                inputmode="url"
                autocomplete="url"
                placeholder="https://music.163.com/playlist?id=..."
                required
              />
            </span>
          </label>

          <p class="playlist-hint" id="playlistHint">支持网易云标准歌单链接、分享短链，也可以直接输入歌单 ID。</p>
          <p class="playlist-status" id="playlistImportStatus" role="status" aria-live="polite"></p>

          <div class="dialog-actions">
            <button class="dialog-button dialog-button--quiet" id="cancelPlaylistImport" type="button">取消</button>
            <button class="dialog-button dialog-button--primary" id="parsePlaylistButton" type="submit">
              <span>随机解析并上墙</span>
              <i aria-hidden="true"></i>
            </button>
          </div>
        </form>
      </div>
    </dialog>

    <dialog class="share-image-dialog" id="shareImageDialog" aria-labelledby="shareImageDialogTitle">
      <div class="share-image-dialog__surface">
        <button class="dialog-close" id="closeShareImageDialog" type="button" aria-label="关闭分享图片弹窗">
          <span aria-hidden="true"></span>
        </button>

        <div class="share-image-heading">
          <span class="dialog-kicker">SHARE AS IMAGE</span>
          <h2 id="shareImageDialogTitle">保存这面唱片墙</h2>
          <p>手机端长按图片保存，电脑端右键图片保存。</p>
        </div>

        <div class="share-image-stage" id="shareImageStage" aria-busy="true">
          <div class="share-image-loader" aria-hidden="true">
            <i></i>
            <span>正在冲印墙面照片</span>
          </div>
          <img id="shareImagePreview" alt="生成的唱片收藏墙分享图片" hidden />
        </div>

        <p class="share-image-status" id="shareImageStatus" role="status" aria-live="polite"></p>
      </div>
    </dialog>

    <template id="recordTemplate">
      <article class="record-item">
        <div class="acrylic-frame" role="img">
          <span class="plate-depth" aria-hidden="true"></span>
          <span class="album-slot"></span>
          <span class="plate-face" aria-hidden="true"></span>
          <span class="plate-reflection" aria-hidden="true"></span>

          <span class="screw screw--tl" aria-hidden="true"></span>
          <span class="screw screw--tr" aria-hidden="true"></span>
          <span class="screw screw--bl" aria-hidden="true"></span>
          <span class="screw screw--br" aria-hidden="true"></span>
        </div>
      </article>
    </template>

    <script src="./script.js"></script>
  </body>
</html>
